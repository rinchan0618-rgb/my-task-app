<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Task Sync Pro Plus</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a375f; border-bottom: 2px solid #1a375f; padding-bottom: 10px; }
        .input-section { display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: -5px; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .time-row { display: flex; gap: 5px; align-items: center; }
        .add-btn { padding: 15px; background: #1a375f; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 5px; }
        .prio-high { border-left: 10px solid #dc3545 !important; }
        .prio-mid { border-left: 10px solid #ffc107 !important; }
        .prio-low { border-left: 10px solid #28a745 !important; }
        li { background: #fff; margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .completed { opacity: 0.4; background: #f9f9f9 !important; text-decoration: line-through; }
        .task-header { font-weight: bold; font-size: 18px; color: #333; }
        .task-info { font-size: 14px; color: #555; margin: 8px 0; line-height: 1.4; }
        .memo-box { background: #fffde7; padding: 8px; border-radius: 4px; font-size: 13px; color: #444; border: 1px dashed #ffd54f; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 10px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .del-btn { background: #ffebee; color: #d9534f; }
        .line-btn { background: #e7ffed; color: #28a745; }
        .cal-btn { background: #e8f0fe; color: #4285f4; }
    </style>
</head>
<body>
<div class="container">
    <h2>🤝 共有タスク Pro (詳細版)</h2>
    <div class="input-section">
        <label>タスク名</label>
        <input type="text" id="taskInput" placeholder="例：歌って倶楽部">
        <label>優先度</label>
        <select id="prioInput">
            <option value="prio-high">高 (赤)</option>
            <option value="prio-mid" selected>中 (黄)</option>
            <option value="prio-low">低 (緑)</option>
        </select>
        <label>日付</label>
        <input type="date" id="dateInput">
        <label>時間帯</label>
        <div class="time-row">
            <input type="time" id="startInput"> <span>〜</span> <input type="time" id="endInput">
        </div>
        <label>メモ / リマインダー設定</label>
        <textarea id="memoInput" rows="2" placeholder="例：1日前通知設定、持ち物など"></textarea>
        <button class="add-btn" onclick="addTask()">共有リストに登録</button>
    </div>
    <ul id="taskList"></ul>
</div>
<script>
    // ★ あなたのFirebase情報をここに反映します ★
    const firebaseConfig = {
        apiKey: "AIzaSyCzKJyqnUrK8bejgnatlxhK6NmxjsOK2f0",
        authDomain: "biz-task-sync.firebaseapp.com",
        databaseURL: "https://biz-task-sync-default-rtdb.firebaseio.com",
        projectId: "biz-task-sync",
        storageBucket: "biz-task-sync.appspot.com",
        messagingSenderId: "648219626194", 
        appId: " 1:648219626194:web:d17cd3e5790f52f57afb0b"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    database.ref('tasks').on('value', (snapshot) => { renderTasks(snapshot.val()); });

    function addTask() {
        const title = document.getElementById('taskInput').value;
        const prio = document.getElementById('prioInput').value;
        const date = document.getElementById('dateInput').value;
        const start = document.getElementById('startInput').value;
        const end = document.getElementById('endInput').value;
        const memo = document.getElementById('memoInput').value;
        if (!title) return alert("タスク名を入力してください");

        database.ref('tasks').push({ title, prio, date, start, end, memo, completed: false });
        // 入力欄をリセット
        document.getElementById('taskInput').value = '';
        document.getElementById('memoInput').value = '';
    }

    function renderTasks(tasks) {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        if (!tasks) return;
        Object.keys(tasks).forEach(key => {
            const t = tasks[key];
            const li = document.createElement('li');
            li.className = `${t.prio} ${t.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <div onclick="toggleTask('${key}', ${t.completed})">
                    <div class="task-header">${t.title}</div>
                    <div class="task-info">
                        📅 ${t.date || 'なし'} <br>
                        ⏰ ${t.start || '--:--'} 〜 ${t.end || '--:--'}
                    </div>
                    ${t.memo ? `<div class="memo-box">📝 ${t.memo}</div>` : ''}
                </div>
                <div class="btn-group">
                    <button class="line-btn" onclick="shareLine('${t.title}', '${t.date}', '${t.start}', '${t.end}', '${t.memo}')">LINE</button>
                    <button class="cal-btn" onclick="toGoogle('${t.title}', '${t.date}', '${t.start}', '${t.end}')">Google</button>
                    <button class="del-btn" onclick="deleteTask('${key}')">削除</button>
                </div>`;
            list.appendChild(li);
        });
    }

    function toggleTask(key, status) { database.ref('tasks/' + key).update({ completed: !status }); }
    function deleteTask(key) { if(confirm('全員のリストから消去しますか？')) database.ref('tasks/' + key).remove(); }
    
    function shareLine(t, d, s, e, m) {
        const text = `【共有タスク】\n内容：${t}\n日時：${d} ${s}〜${e}\nメモ：${m}`;
        window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, '_blank');
    }

    function toGoogle(t, d, s, e) {
        if(!d || !s) return alert("日付と開始時間を入力してください");
        const ds = d.replace(/-/g, '') + 'T' + s.replace(/:/g, '') + '00';
        const de = d.replace(/-/g, '') + 'T' + (e ? e.replace(/:/g, '') : s.replace(/:/g, '')) + '00';
        window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t)}&dates=${ds}/${de}`, '_blank');
    }
</script>
</body>
</html>
