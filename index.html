<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Task Sync Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a375f; border-bottom: 2px solid #1a375f; padding-bottom: 10px; }
        .input-section { display: flex; flex-direction: column; gap: 12px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .add-btn { padding: 15px; background: #1a375f; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .prio-high { border-left: 10px solid #dc3545 !important; }
        .prio-mid { border-left: 10px solid #ffc107 !important; }
        .prio-low { border-left: 10px solid #28a745 !important; }
        li { background: #fff; margin-bottom: 12px; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .completed { opacity: 0.4; background: #f9f9f9 !important; }
        .task-header { font-weight: bold; font-size: 17px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .del-btn { background: #eee; color: #d9534f; border: none; padding: 8px; border-radius: 4px; flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <h2>🤝 チーム共有タスク</h2>
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="タスクを入力...">
        <select id="prioInput">
            <option value="prio-high">優先：高 (赤)</option>
            <option value="prio-mid" selected>優先：中 (黄)</option>
            <option value="prio-low">優先：低 (緑)</option>
        </select>
        <input type="date" id="dateInput">
        <button class="add-btn" onclick="addTask()">共有リストに登録</button>
    </div>
    <ul id="taskList"></ul>
</div>
<script>
    // ★ Firebaseの設定（後で書き換えます） ★
    const firebaseConfig = {
        apiKey: "仮のキー",
        authDomain: "仮のドメイン",
        databaseURL: "仮のURL",
        projectId: "仮のID",
        storageBucket: "仮のバケット",
        messagingSenderId: "仮のID",
        appId: "仮のAPPID"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    database.ref('tasks').on('value', (snapshot) => {
        const tasks = snapshot.val();
        renderTasks(tasks);
    });
    function addTask() {
        const title = document.getElementById('taskInput').value;
        const prio = document.getElementById('prioInput').value;
        const date = document.getElementById('dateInput').value;
        if (!title) return alert("内容を入力してください");
        database.ref('tasks').push({ title: title, prio: prio, date: date, completed: false });
        document.getElementById('taskInput').value = '';
    }
    function renderTasks(tasks) {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        if (!tasks) return;
        Object.keys(tasks).forEach(key => {
            const t = tasks[key];
            const li = document.createElement('li');
            li.className = `${t.prio} ${t.completed ? 'completed' : ''}`;
            li.innerHTML = `<div onclick="toggleTask('${key}', ${t.completed})"><div class="task-header">${t.title}</div><div style="font-size:12px; color:#666;">📅 ${t.date || 'なし'}</div></div><div class="btn-group"><button class="del-btn" onclick="deleteTask('${key}')">削除</button></div>`;
            list.appendChild(li);
        });
    }
    function toggleTask(key, currentStatus) { database.ref('tasks/' + key).update({ completed: !currentStatus }); }
    function deleteTask(key) { if(confirm('全員のリストから消去しますか？')) { database.ref('tasks/' + key).remove(); } }
</script>
</body>
</html>
